<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" style="background:#0f172a;font-family:system-ui,sans-serif">
  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="bold">ARCHITECT — System Architecture</text>
  <text x="450" y="56" text-anchor="middle" fill="#94a3b8" font-size="12">Gemini Live API + ADK Multi-Agent System</text>

  <!-- Browser box -->
  <rect x="30" y="90" width="180" height="160" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="120" y="113" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="bold">Browser</text>
  <text x="120" y="132" text-anchor="middle" fill="#94a3b8" font-size="10">React 18 + Vite</text>
  <rect x="46" y="140" width="148" height="18" rx="4" fill="#0f172a"/>
  <text x="120" y="153" text-anchor="middle" fill="#e2e8f0" font-size="10">📷 Camera (JPEG 1fps)</text>
  <rect x="46" y="162" width="148" height="18" rx="4" fill="#0f172a"/>
  <text x="120" y="175" text-anchor="middle" fill="#e2e8f0" font-size="10">🎤 Mic (PCM 16kHz)</text>
  <rect x="46" y="184" width="148" height="18" rx="4" fill="#0f172a"/>
  <text x="120" y="197" text-anchor="middle" fill="#e2e8f0" font-size="10">🔊 Audio Playback</text>
  <rect x="46" y="206" width="148" height="18" rx="4" fill="#0f172a"/>
  <text x="120" y="219" text-anchor="middle" fill="#e2e8f0" font-size="10">🖼️ Design Gallery</text>
  <rect x="46" y="228" width="148" height="18" rx="4" fill="#0f172a"/>
  <text x="120" y="241" text-anchor="middle" fill="#e2e8f0" font-size="10">🛒 Shopping Panel</text>

  <!-- WebSocket arrow -->
  <line x1="210" y1="170" x2="290" y2="170" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="290" y1="200" x2="210" y2="200" stroke="#6366f1" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="250" y="163" text-anchor="middle" fill="#818cf8" font-size="9">WebSocket</text>
  <text x="250" y="215" text-anchor="middle" fill="#818cf8" font-size="9">JSON + PCM</text>

  <!-- Cloud Run box -->
  <rect x="290" y="80" width="200" height="260" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="390" y="103" text-anchor="middle" fill="#8b5cf6" font-size="13" font-weight="bold">Cloud Run</text>
  <text x="390" y="120" text-anchor="middle" fill="#94a3b8" font-size="10">FastAPI + uvicorn</text>

  <!-- ADK box -->
  <rect x="306" y="130" width="168" height="190" rx="8" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="390" y="150" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="bold">ADK Root Agent</text>
  <text x="390" y="165" text-anchor="middle" fill="#94a3b8" font-size="9">Gemini 2.0 Flash Live</text>
  <line x1="316" y1="172" x2="464" y2="172" stroke="#334155" stroke-width="1"/>
  <text x="390" y="186" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">Tools:</text>
  <text x="390" y="202" text-anchor="middle" fill="#e2e8f0" font-size="10">analyze_room</text>
  <text x="390" y="218" text-anchor="middle" fill="#e2e8f0" font-size="10">generate_redesign</text>
  <text x="390" y="234" text-anchor="middle" fill="#e2e8f0" font-size="10">generate_color_palette</text>
  <text x="390" y="250" text-anchor="middle" fill="#e2e8f0" font-size="10">search_furniture</text>
  <text x="390" y="266" text-anchor="middle" fill="#e2e8f0" font-size="10">build_shopping_list</text>
  <text x="390" y="285" text-anchor="middle" fill="#94a3b8" font-size="9">System Prompt: SCANNING →</text>
  <text x="390" y="298" text-anchor="middle" fill="#94a3b8" font-size="9">DESIGNING → SHOPPING</text>
  <text x="390" y="311" text-anchor="middle" fill="#94a3b8" font-size="9">InMemorySessionService</text>

  <!-- Gemini APIs -->
  <rect x="540" y="80" width="160" height="100" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
  <text x="620" y="103" text-anchor="middle" fill="#06b6d4" font-size="12" font-weight="bold">Gemini APIs</text>
  <text x="620" y="122" text-anchor="middle" fill="#e2e8f0" font-size="10">🎙 Live API (voice+vision)</text>
  <text x="620" y="138" text-anchor="middle" fill="#e2e8f0" font-size="10">🖼 Imagen 3 (redesign)</text>
  <text x="620" y="154" text-anchor="middle" fill="#e2e8f0" font-size="10">⚡ Flash 2.0 (shopping)</text>
  <text x="620" y="170" text-anchor="middle" fill="#94a3b8" font-size="9">google.ai.dev</text>

  <!-- Arrow Cloud Run → Gemini -->
  <line x1="490" y1="130" x2="538" y2="130" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Firestore -->
  <rect x="540" y="210" width="155" height="70" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="618" y="233" text-anchor="middle" fill="#10b981" font-size="12" font-weight="bold">Firestore</text>
  <text x="618" y="250" text-anchor="middle" fill="#e2e8f0" font-size="10">Room analyses</text>
  <text x="618" y="265" text-anchor="middle" fill="#e2e8f0" font-size="10">Designs · Shopping lists</text>

  <!-- Arrow Cloud Run → Firestore -->
  <line x1="490" y1="240" x2="538" y2="240" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr4)"/>

  <!-- GCS -->
  <rect x="540" y="310" width="155" height="70" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="618" y="333" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold">Cloud Storage</text>
  <text x="618" y="350" text-anchor="middle" fill="#e2e8f0" font-size="10">Generated images</text>
  <text x="618" y="365" text-anchor="middle" fill="#e2e8f0" font-size="10">Frontend static files</text>

  <!-- Arrow Cloud Run → GCS -->
  <line x1="490" y1="310" x2="538" y2="335" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr5)"/>

  <!-- Cloud Build -->
  <rect x="540" y="410" width="155" height="55" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="618" y="434" text-anchor="middle" fill="#6366f1" font-size="12" font-weight="bold">Cloud Build</text>
  <text x="618" y="452" text-anchor="middle" fill="#e2e8f0" font-size="10">CI/CD pipeline</text>

  <!-- GCP boundary -->
  <rect x="280" y="70" width="440" height="430" rx="14" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="500" y="516" text-anchor="middle" fill="#475569" font-size="11">Google Cloud Platform</text>

  <!-- Data flow legend -->
  <rect x="30" y="430" width="230" height="90" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="145" y="450" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">Data Flow</text>
  <line x1="46" y1="465" x2="80" y2="465" stroke="#3b82f6" stroke-width="2"/>
  <text x="90" y="469" fill="#e2e8f0" font-size="10">WebSocket (audio+video)</text>
  <line x1="46" y1="483" x2="80" y2="483" stroke="#06b6d4" stroke-width="2"/>
  <text x="90" y="487" fill="#e2e8f0" font-size="10">Gemini API calls</text>
  <line x1="46" y1="501" x2="80" y2="501" stroke="#10b981" stroke-width="2"/>
  <text x="90" y="505" fill="#e2e8f0" font-size="10">GCP service calls</text>

  <!-- Markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#06b6d4"/>
    </marker>
    <marker id="arr4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <marker id="arr5" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>